<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison Laundrin — Marketing Operations Command Center</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <header id="header">
            <div class="header-inner">
                <div class="brand">
                    <h1>Maison Laundrin</h1>
                    <span class="subtitle">Marketing Operations Command Center</span>
                </div>
                <div class="search-wrap">
                    <input type="text" id="search" placeholder="Search avatars, ads, research, performance..." autocomplete="off">
                    <span class="search-icon">&#x1F50D;</span>
                </div>
            </div>
        </header>

        <!-- TOP NAV -->
        <nav id="top-nav" class="top-nav">
            <div class="nav-inner">
                <button class="nav-pill active" data-nav="avatars">Avatars</button>
                <button class="nav-pill" data-nav="performance">Performance</button>
                <button class="nav-pill" data-nav="pipeline">Research</button>
                <button class="nav-pill" data-nav="adlab">Ad Lab</button>
                <button class="nav-pill" data-nav="testing">Testing</button>
                <button class="nav-pill" data-nav="hub">Hub</button>
            </div>
        </nav>

        <!-- DASHBOARD VIEW (Avatars) -->
        <main id="dashboard" class="view active">
            <div class="filter-bar" id="filter-bar">
                <span class="filter-label">Filter by theme:</span>
                <button class="filter-tag active" data-filter="all">All Avatars</button>
            </div>

            <div class="tier-label">Tier 1 — Core Buyers</div>
            <div id="grid-tier1" class="avatar-grid"></div>
            <div class="tier-label tier-2">Tier 2 — Niche Pain Points</div>
            <div id="grid-tier2" class="avatar-grid"></div>

            <div class="tier-label" style="margin-top:48px;color:var(--accent-blue)">Competitive Landscape</div>
            <div id="competitor-overview"></div>
        </main>

        <!-- PERFORMANCE VIEW -->
        <main id="performance-view" class="view">
            <div id="perf-content"></div>
        </main>

        <!-- PIPELINE VIEW (Research) -->
        <main id="pipeline-view" class="view">
            <div class="view-header">
                <h2 class="view-title">Research Pipeline</h2>
                <div class="view-meta" id="pipeline-meta"></div>
            </div>
            <div class="pipeline-filters" id="pipeline-filters">
                <div class="pipeline-filter-group">
                    <span class="filter-label">Type:</span>
                    <button class="filter-tag active" data-ptype="all">All</button>
                    <button class="filter-tag" data-ptype="quote">Quotes</button>
                    <button class="filter-tag" data-ptype="insight">Insights</button>
                    <button class="filter-tag" data-ptype="competitor">Competitor</button>
                    <button class="filter-tag" data-ptype="market">Market</button>
                    <button class="filter-tag" data-ptype="idea">Ideas</button>
                </div>
                <div class="pipeline-filter-group">
                    <span class="filter-label">Status:</span>
                    <button class="filter-tag active" data-pstatus="all">All</button>
                    <button class="filter-tag" data-pstatus="new">New</button>
                    <button class="filter-tag" data-pstatus="reviewed">Reviewed</button>
                    <button class="filter-tag" data-pstatus="integrated">Integrated</button>
                </div>
            </div>
            <div id="pipeline-feed" class="pipeline-feed"></div>
        </main>

        <!-- AD LAB VIEW -->
        <main id="adlab-view" class="view">
            <div id="adlab-content"></div>
        </main>

        <!-- TESTING VIEW -->
        <main id="testing-view" class="view">
            <div id="testing-content"></div>
        </main>

        <!-- HUB VIEW (Integrations) -->
        <main id="hub-view" class="view">
            <div id="hub-content"></div>
        </main>

        <!-- SEARCH RESULTS VIEW -->
        <main id="search-results" class="view">
            <div class="results-header">
                <button class="back-btn" onclick="clearSearch()">&larr; Back</button>
                <h2 id="search-results-title">Search Results</h2>
            </div>
            <div id="search-results-list"></div>
        </main>

        <!-- PROFILE VIEW -->
        <main id="profile" class="view">
            <div class="profile-nav">
                <button class="back-btn" id="back-btn">&larr; Back</button>
                <div class="profile-nav-arrows">
                    <button class="nav-arrow" id="prev-btn">&larr; Prev</button>
                    <button class="nav-arrow" id="next-btn">Next &rarr;</button>
                </div>
            </div>

            <div class="profile-header" id="profile-header"></div>

            <div class="profile-body">
                <div class="tabs" id="tabs">
                    <button class="tab active" data-tab="overview">Overview</button>
                    <button class="tab" data-tab="pain">Pain Points</button>
                    <button class="tab" data-tab="language">Language Bank</button>
                    <button class="tab" data-tab="messaging">Messaging</button>
                    <button class="tab" data-tab="objections">Objections</button>
                    <button class="tab" data-tab="social-proof">Social Proof</button>
                    <button class="tab" data-tab="competitors">Competitors</button>
                    <button class="tab" data-tab="ads">Ad Creative</button>
                    <button class="tab" data-tab="targeting">Targeting</button>
                    <button class="tab" data-tab="performance">Performance</button>
                </div>

                <div class="tab-content" id="tab-content"></div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="data/avatars.js"></script>
    <script src="data/research.js"></script>
    <script src="data/performance.js"></script>
    <script src="data/pipeline.js"></script>
    <script src="data/adlibrary.js"></script>
    <script src="data/testing.js"></script>
    <script src="data/integrations.js"></script>
    <script src="app.js"></script>
</body>
</html>
